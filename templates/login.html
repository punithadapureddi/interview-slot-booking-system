{% extends 'base.html' %}
{% block title %}Login | SlotBook{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon"><i class="bi bi-briefcase-fill"></i></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to manage interview slots or book your place.</p>
    </div>

    <form method="POST">
      <div class="mb-3 input-group-custom">
        <i class="bi bi-envelope input-icon"></i>
        <input type="email" class="form-control form-control-custom" name="email" placeholder="Email address" required>
      </div>
      <div class="mb-4 input-group-custom">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="form-control form-control-custom" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100">Login</button>
    </form>

    <div class="d-flex justify-content-between align-items-center mt-3 auth-footer-text">
      <span>New student?</span>
      <a href="{{ url_for('register') }}" class="auth-link">Create account</a>
    </div>

    <div class="admin-hint">
      Admin login: <strong>admin@interview.com</strong> / <strong>admin123</strong>
    </div>
  </div>
</div>
{% endblock %}
