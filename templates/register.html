{% extends 'base.html' %}
{% block title %}Register | SlotBook{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon"><i class="bi bi-person-plus-fill"></i></div>
      <h1 class="auth-title">Student registration</h1>
      <p class="auth-subtitle">Create your account to start booking interview slots.</p>
    </div>

    <form method="POST">
      <div class="mb-3 input-group-custom">
        <i class="bi bi-person input-icon"></i>
        <input type="text" class="form-control form-control-custom" name="name" placeholder="Full name" required>
      </div>
      <div class="mb-3 input-group-custom">
        <i class="bi bi-envelope input-icon"></i>
        <input type="email" class="form-control form-control-custom" name="email" placeholder="Email address" required>
      </div>
      <div class="mb-4 input-group-custom">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="form-control form-control-custom" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100">Register</button>
    </form>

    <div class="d-flex justify-content-between align-items-center mt-3 auth-footer-text">
      <span>Already registered?</span>
      <a href="{{ url_for('login') }}" class="auth-link">Login</a>
    </div>
  </div>
</div>
{% endblock %}
